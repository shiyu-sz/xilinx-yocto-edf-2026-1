# Keep the first-stage loader in Zynq OCM until it has loaded full U-Boot.
# The generic zynq_virt configuration moves its stack/BSS to DDR before the
# console is available, which makes DDR bring-up failures look like resets.
# CONFIG_SPL_STACK_R is not set
CONFIG_SPL_BSS_START_ADDR=0x2e000
CONFIG_SPL_BSS_MAX_SIZE=0x1000

# Do not clear the complete SPL malloc pool before the console is initialized.
# Allocated blocks are initialized by their users as required.
# CONFIG_SPL_SYS_MALLOC_CLEAR_ON_INIT is not set
CONFIG_SPL_HAS_CUSTOM_MALLOC_START=y
CONFIG_SPL_CUSTOM_SYS_MALLOC_ADDR=0x01000000
CONFIG_SPL_SYS_MALLOC_SIZE=0x1000000

# EBAZ4205 has 256 MiB DDR (0x00000000-0x0fffffff).  The generic value
# 0x10000000 is immediately outside RAM; keep the FIT workspace at 128 MiB.
CONFIG_SPL_LOAD_FIT_ADDRESS=0x08000000

CONFIG_DEFAULT_DEVICE_TREE="zynq-ebaz4205"
