args:
    - --hw-description https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0609_1_06092108/external/versal-2ve-2vm-vek386-sdt-seg/versal-2ve-2vm-vek386-sdt-seg_2026.1_0609_1_06092108.tar.gz 
    - --machine-name versal-2ve-2vm-vek386-sdt-seg
    - -g full

kconfig:
    CONFIG_YOCTO_BBMC_MICROBLAZE_RISCV_ASU: n
    CONFIG_SUBSYSTEM_SERIAL_SERIAL1_SELECT: y
    CONFIG_SUBSYSTEM_TF-A_SERIAL_SERIAL1_SELECT: y
    CONFIG_SUBSYSTEM_TF-A_MEMORY_SETTINGS: y
    CONFIG_SUBSYSTEM_TF-A_MEM_BASE: '0x1600000'
    CONFIG_SUBSYSTEM_TF-A_MEM_SIZE: '0x200000'
    CONFIG_SUBSYSTEM_BOOTMODE_8: y

machine:
    description: >-
        Segmented SDT machine for the AMD Versal Gen 2 VEK386 evaluation
        kit: Cortex-A78 Linux plus MicroBlaze PMC firmware sub-machine.
    post:
        QEMU_HW_DTB_PS:
            op: '='
            val: "${QEMU_HW_DTB_PATH}/board-versal2-psxc-vek386.dtb"
        QEMU_HW_SERIAL:
            op: '='
            val: "-serial null -serial null -serial null -serial mon:stdio"
        QEMU_FLASH_TYPE:
            op: '='
            val: 'ospi'
        QB_DEFAULT_FSTYPE:
            op: '='
            val: "wic.ufs"
        SPI_IMAGE_SIZE:
            comment: 'OSPI flash size (256M)'
            op: '='
            val: '0x1000_0000'
        QEMU_SECONDARY_BOOT_MODE:
            op: '='
            val: '11'
