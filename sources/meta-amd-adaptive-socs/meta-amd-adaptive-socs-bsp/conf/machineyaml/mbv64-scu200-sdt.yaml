args:
  - --hw-description https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0511_1_05110825/external/mbv64-scu200-sdt/mbv64-scu200-sdt_2026.1_0511_1_05110825.tar.gz
  - --machine-name mbv64-scu200-sdt

machine:
    description: >-
        Machine configuration for the AMD SCU200 board running a 64-bit
        AMD MicroBlaze V processor (soft-core RISC-V processor IP),
        built from system device tree.

kconfig:
    CONFIG_SUBSYSTEM_UBOOT_CONFIG_TARGET: 'xilinx_mbv64_smode_defconfig xilinx_mbv_ospi.config'
    CONFIG_SUBSYSTEM_SERIAL_AXI_UARTLITE_0_SELECT: y
