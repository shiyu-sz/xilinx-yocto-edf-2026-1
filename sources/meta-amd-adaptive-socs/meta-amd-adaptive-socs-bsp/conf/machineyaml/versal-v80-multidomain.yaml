inherit:
    ${BSPLAYERDIR_amd-adaptive-socs-bsp}/conf/machineyaml/versal-v80-sdt-seg.yaml

args:
    - --machine-name versal-v80-multidomain
    - --domain-file ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/versal-multidomain-base.yaml \
                    ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/versal-openamp-overlay.yaml \
                    ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/versal-libmetal-overlay.yaml

kconfig:
    CONFIG_YOCTO_BBMC_LINUX_DTSI: \
        ${LAYER_PATH_xilinx-virtualization}/recipes-bsp/device-tree/files/versal-xen.dtsi \
        ${BSPLAYERDIR_amd-adaptive-socs-bsp}/recipes-bsp/device-tree/files/platform-misc.dtsi

machine:
    description: >-
        AMP/multidomain machine for the AMD Alveo V80 Compute
        Accelerator Card (Versal Premium): Cortex-A72 Linux, Cortex-R5
        FreeRTOS/baremetal, and MicroBlaze PMC/PSM sub-machines built
        from system device tree.
