inherit:
    ${BSPLAYERDIR_amd-adaptive-socs-bsp}/conf/machineyaml/zynqmp-zcu111-sdt-full.yaml

args:
    - --machine-name zynqmp-zcu111-multidomain

kconfig:
    CONFIG_YOCTO_BBMC_LINUX_DTSI: \
        ${LAYER_PATH_xilinx-virtualization}/recipes-bsp/device-tree/files/zynqmp-xen.dtsi

machine:
    description: >-
        AMP/multidomain machine for the AMD Zynq UltraScale+ RFSoC
        ZCU111 evaluation kit: Cortex-A53 Linux plus Cortex-A53 FSBL and
        MicroBlaze PMU sub-machines built from system device tree.
