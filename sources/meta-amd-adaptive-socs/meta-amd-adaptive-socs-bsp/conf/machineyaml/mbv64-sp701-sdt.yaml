args:
  - --hw-description https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0609_1_06092108/external/mbv64-sp701-sdt/mbv64-sp701-sdt_2026.1_0609_1_06092108.tar.gz
  - --machine-name mbv64-sp701-sdt

kconfig:
    CONFIG_SUBSYSTEM_SERIAL_AXI_UARTLITE_0_SELECT: y

machine:
    description: >-
        Machine configuration for the AMD SP701 board running a 64-bit
        AMD MicroBlaze V processor (soft-core RISC-V processor IP),
        built from system device tree.
