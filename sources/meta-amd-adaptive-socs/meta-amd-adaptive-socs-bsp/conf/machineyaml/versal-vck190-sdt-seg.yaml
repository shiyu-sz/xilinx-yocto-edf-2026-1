args:
    - --hw-description https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0609_1_06092108/external/versal-vck190-sdt-seg/versal-vck190-sdt-seg_2026.1_0609_1_06092108.tar.gz
    - --machine-name versal-vck190-sdt-seg
    - -g full

kconfig:
    CONFIG_SUBSYSTEM_BOOTMODE_14: y

machine:
    description: >-
        Segmented SDT machine for the AMD Versal AI Core VCK190
        evaluation kit: Cortex-A72 Linux plus MicroBlaze PMC/PSM
        firmware sub-machines.
    post:
        QEMU_HW_DTB_PS:
            op: '='
            val: "${QEMU_HW_DTB_PATH}/board-versal-ps-vck190.dtb"
        QEMU_HW_DTB_PMC:
            op: '='
            val: "${QEMU_HW_DTB_PATH}/board-versal-pmc-virt.dtb"
        QEMU_FLASH_TYPE:
            op: '='
            val: 'qspi'
        SPI_IMAGE_SIZE:
            comment: 'QSPI flash size (256MB) - XBM daughter card'
            op: '='
            val: '0x1000_0000'
        SPI_BOOTBIN_OFFSET:
            comment: 'Boot.bin A/B offsets for 256MB QSPI'
            op: '='
            val: '0x15C_0000 0x47C_0000'
        SPI_USER_SCRATCH_OFFSET:
            op: '='
            val: '0x7A0_0000'
        SPI_MANIFEST_OFFSET:
            op: '='
            val: '0x7FF_0000'
