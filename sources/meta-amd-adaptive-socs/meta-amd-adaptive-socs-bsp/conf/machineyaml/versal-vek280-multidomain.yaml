inherit:
    ${BSPLAYERDIR_amd-adaptive-socs-bsp}/conf/machineyaml/versal-vek280-sdt-seg.yaml

args:
    - --machine-name versal-vek280-multidomain
    - --domain-file ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/versal-multidomain-base.yaml \
                    ${BSPLAYERDIR_amd-adaptive-socs-bsp}/conf/domainyaml/vek280-linux-overlay.yaml \
                    ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/versal-openamp-overlay.yaml \
                    ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/versal-libmetal-overlay.yaml

kconfig:
    CONFIG_YOCTO_BBMC_CORTEXR5_1_BAREMETAL: y
    CONFIG_YOCTO_BBMC_LINUX_DTSI: \
        ${LAYER_PATH_xilinx-standalone-sdt}/recipes-bsp/device-tree/files/ospi-2g-memory-map.dtsi \
        ${LAYER_PATH_xilinx-virtualization}/recipes-bsp/device-tree/files/versal-xen.dtsi \
        ${BSPLAYERDIR_amd-adaptive-socs-bsp}/recipes-bsp/device-tree/files/platform-misc.dtsi

machine:
    description: >-
        AMP/multidomain machine for the AMD Versal AI Edge VEK280
        evaluation kit: Cortex-A72 Linux, Cortex-R5 FreeRTOS/baremetal,
        and MicroBlaze PMC/PSM sub-machines built from system device
        tree.
    post:
        include:
            comment: "Enable meta-xilinx-imgrcvry if available"
            op: 'conf/enable-xilinx-imgrcvry.conf'
        XLNX_CMAKE_BSP_VARS:pn-xilplmi:append:
            comment: 'Enables the restoration of the multi-boot register for A/B firmware platforms'
            op: '='
            val: ' -DPLM_ENABLE_RESTORE_MULTIBOOT'
        PRODUCT_NAME:
            comment: 'UEFI Capsule Update / LVFS Configuration'
            op: '='
            val: 'VEK280'
        PRODUCT_GUID:
            op: '='
            val: 'a1f0d8c9-b3a7-4e09-9f25-7c9823b8a6f2'
        PRODUCT_URL:
            op: '='
            val: 'https://www.amd.com/en/products/adaptive-socs-and-fpgas/versal.html'
        BOOTBIN_INC:
            comment: 'Enable libmetal application'
            op: '='
            val: 'libmetal-demo-rpu1.inc'
        SPI_IMAGE_SIZE:
            comment: 'OSPI flash size (256MB)'
            op: '='
            val: '0x1000_0000'
