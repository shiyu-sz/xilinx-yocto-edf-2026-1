inherit:
    ${BSPLAYERDIR_amd-adaptive-socs-bsp}/conf/machineyaml/versal-vpk180-sdt-seg.yaml

args:
    - --machine-name versal-vpk180-multidomain

args_append:
    - --domain-file ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/versal-multidomain-base.yaml \
                    ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/versal-openamp-overlay.yaml \
                    ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/versal-libmetal-overlay.yaml

kconfig:
    CONFIG_YOCTO_BBMC_LINUX_DTSI: ${LAYER_PATH_xilinx-virtualization}/recipes-bsp/device-tree/files/versal-xen.dtsi \
        ${BSPLAYERDIR_amd-adaptive-socs-bsp}/recipes-bsp/device-tree/files/platform-misc.dtsi
machine:
    description: >-
        AMP/multidomain machine for the AMD Versal Premium VPK180
        evaluation kit: Cortex-A72 Linux, Cortex-R5 FreeRTOS/baremetal,
        and MicroBlaze PMC/PSM sub-machines built from system device
        tree.
    post:
        BOOTBIN_INC:
            comment: 'Enable libmetal application'
            op: '=' 
            val: 'libmetal-demo-rpu1.inc'
