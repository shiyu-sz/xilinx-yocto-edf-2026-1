args:
    - --hw-description https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0609_1_06092108/external/versal-vm-p-m1369-00-reva-x-prc-01-reva-sdt-seg/versal-vm-p-m1369-00-reva-x-prc-01-reva-sdt-seg_2026.1_0609_1_06092108.tar.gz
    - --machine-name versal-vm-p-m1369-00-reva-x-prc-01-reva-sdt-seg
    - -g full

kconfig:
    CONFIG_SUBSYSTEM_BOOTMODE_5: y

machine:
    description: >-
        Segmented SDT machine for the AMD Versal VM-P-M1369-00 Rev A
        system-on-module on the X-PRC-01 Rev A carrier card: Cortex-A72
        Linux plus MicroBlaze PMC/PSM firmware sub-machines.
    post:
        QEMU_HW_DTB_PS:
            op: '='
            val: "${QEMU_HW_DTB_PATH}/board-versal-ps-vm-p-m1369-00.dtb"
        QEMU_HW_DTB_PMC:
            op: '='
            val: "${QEMU_HW_DTB_PATH}/board-versal-pmc-virt.dtb"
