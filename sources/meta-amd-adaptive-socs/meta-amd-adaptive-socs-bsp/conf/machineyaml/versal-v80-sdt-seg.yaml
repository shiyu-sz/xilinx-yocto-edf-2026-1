args:
    - --hw-description https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0605_1_06052009/external/versal-v80-sdt-seg/versal-v80-sdt-seg_2026.1_0605_1_06052009.tar.gz
    - --machine-name versal-v80-sdt-seg
    - -g full

kconfig:
    CONFIG_SUBSYSTEM_BOOTMODE_8: y

machine:
    description: >-
        Segmented SDT machine for the AMD Alveo V80 Compute Accelerator
        Card (Versal Premium): Cortex-A72 Linux plus MicroBlaze PMC/PSM
        firmware sub-machines.
    post:
        QEMU_HW_DTB_PS:
            op: '='
            val: "${QEMU_HW_DTB_PATH}/board-versal-ps-v80.dtb"
        QEMU_HW_DTB_PMC:
            op: '='
            val: "${QEMU_HW_DTB_PATH}/board-versal-pmc-virt.dtb"
        QEMU_FLASH_TYPE:
            op: '='
            val: 'ospi'
        SPI_IMAGE_SIZE:
            comment: 'OSPI flash size (256M)'
            op: '='
            val: '0x1000_0000'
        # Secondary boot is SD0 per QEMU settings
        QEMU_SECONDARY_BOOT_MODE:
            op: '='
            val: '3'
