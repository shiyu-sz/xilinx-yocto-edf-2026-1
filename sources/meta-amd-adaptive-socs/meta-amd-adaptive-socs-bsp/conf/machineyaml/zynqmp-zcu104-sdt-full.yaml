args:
    - --hw-description https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0609_1_06092108/external/zynqmp-zcu104-sdt-full/zynqmp-zcu104-sdt-full_2026.1_0609_1_06092108.tar.gz
    - --machine-name zynqmp-zcu104-sdt-full
    - -g full
    - --domain-file ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/zynqmp-linux-only-base.yaml \
                    ${BSPLAYERDIR_amd-adaptive-socs-bsp}/conf/domainyaml/zcu104-linux-overlay.yaml

kconfig:
    CONFIG_SUBSYSTEM_BOOTMODE_5: y

machine:
    description: >-
        Machine configuration for the AMD Zynq UltraScale+ MPSoC ZCU104
        evaluation kit (Cortex-A53 Linux plus FSBL and MicroBlaze PMU
        sub-machines), built from system device tree.
    post:
        QB_MEM:
            op: '='
            val: "-m 4G"
        QEMU_HW_DTB_PS:
            op: '='
            val: "${QEMU_HW_DTB_PATH}/board-zynqmp-zcu104.dtb"
        QEMU_HW_DTB_PMU:
            op: '='
            val: "${QEMU_HW_DTB_PATH}/zynqmp-pmu.dtb"
