args:
    - --hw-description https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0609_1_06092108/external/zynq-zc706-sdt-full/zynq-zc706-sdt-full_2026.1_0609_1_06092108.tar.gz
    - --machine-name zynq-zc706-sdt-full
    - -g full
    - --domain-file ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/zynq-linux-only-base.yaml

kconfig:
    CONFIG_SUBSYSTEM_BOOTMODE_5: y

machine:
    description: >-
        Machine configuration for the AMD Zynq-7000 ZC706 evaluation kit
        (Cortex-A9 Linux plus FSBL sub-machine), built from system
        device tree.
    pre:
    post:
        QB_MEM:
            op: '='
            val: "-m 1024"
        QEMU_HW_SERIAL:
            op: '='
            val: "-serial null -serial mon:stdio"
