#@TYPE: Machine
#@NAME: mbv64-sp701-sdt
#@DESCRIPTION: Machine configuration for the AMD SP701 board running a 64-bit AMD MicroBlaze V processor (soft-core RISC-V processor IP), built from system device tree.

#### Preamble
MACHINEOVERRIDES =. "${@['', 'mbv64-sp701-sdt:']['mbv64-sp701-sdt' !='${MACHINE}']}"
#### Regular settings follow

# MicroBlaze V Tune features Settings
require conf/machine/include/mbv64-sp701-sdt/microblaze-v.inc

# Set the default (linux) domain device tree
CONFIG_DTFILE_DIR := "${@bb.utils.which(d.getVar('BBPATH'), 'conf/dts/mbv64-sp701-sdt')}"
CONFIG_DTFILE ?= "${CONFIG_DTFILE_DIR}/microblaze-riscv-linux.dts"
CONFIG_DTFILE[vardepsexclude] += "CONFIG_DTFILE_DIR"

DTB_FILE_PATH ?= "${RECIPE_SYSROOT}/boot/devicetree/${@os.path.basename(d.getVar('CONFIG_DTFILE').replace('.dts', '.dtb'))}"

# Yocto u-boot-xlnx variables
SPL_BINARY ?= "spl/u-boot-spl.bin"

# Set DDR Base address for u-boot-xlnx-scr variables
DDR_BASEADDR ?= "0x80000000"
SKIP_APPEND_BASEADDR ?= "0"

# Yocto KERNEL Variables
UBOOT_ENTRYPOINT ?= "0x81200000"
UBOOT_LOADADDRESS ?= "0x81200000"

# Required generic machine inclusion
require conf/machine/microblaze-v-generic.conf

# Yocto Riscv OPENSBI variables
RISCV_SBI_FW_TEXT_START = "0x80000000"

# This is an 'SDT' based BSP
XILINX_WITH_ESW = "sdt"

# Original SDT artifacts URL
SDT_URI = "https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0609_1_06092108/external/mbv64-sp701-sdt/mbv64-sp701-sdt_2026.1_0609_1_06092108.tar.gz"
SDT_URI[sha256sum] = "e528b59514227633787c0da2429da80aeb7c68b0459be6a6941b2b1e82235b37"
SDT_URI[S] = "${WORKDIR}/mbv64-sp701-sdt_2026.1_0609_1_06092108"

# Set the system device trees
SYSTEM_DTFILE_DEPENDS = "sdt-artifacts"
SYSTEM_DTFILE_DIR = "${RECIPE_SYSROOT}${datadir}/sdt/${MACHINE}"
SYSTEM_DTFILE = "${SYSTEM_DTFILE_DIR}/system-top.dts"

# microblaze-v bitstream path 
BITSTREAM_PATH_DEPENDS = "sdt-artifacts"
BITSTREAM_PATH_DIR = "${RECIPE_SYSROOT}${datadir}/sdt/${MACHINE}"
BITSTREAM_PATH = "${BITSTREAM_PATH_DIR}/sp701_base.bit"

# Primary Bootmode value
DEFAULT_HW_BOOT_MODE = ""

# Update bootbin to use proper device tree
BIF_PARTITION_IMAGE[device-tree] = "${DTB_FILE_PATH}"

# Remap boot files to ensure the right device tree is listed first
IMAGE_BOOT_FILES =+ "devicetree/${@os.path.basename(d.getVar('CONFIG_DTFILE').replace('.dts', '.dtb'))}"

#### No additional settings should be after the Postamble
#### Postamble
PACKAGE_EXTRA_ARCHS:append = "${@['', ' mbv64_sp701_sdt']['mbv64-sp701-sdt' != '${MACHINE}']}"
