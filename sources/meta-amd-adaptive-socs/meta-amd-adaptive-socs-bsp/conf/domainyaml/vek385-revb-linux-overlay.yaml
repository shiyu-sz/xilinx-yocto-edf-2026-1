reserved-memory:
  ranges: true
  "#size-cells": 2
  "#address-cells": 2

  plm_reserved_memory@00000000:
    label: plm_reserved_memory
    no-map: true
    start: 0x00000000
    size: 16M
  tfa_reserved_memory@1000000:
    label: tfa_reserved_memory
    no-map: true
    start: 0x01000000
    size: 6M
  cma_reserved@800000000:
    label: cma_reserved_800000000
    start: 0x800000000
    size: 4G
    compatible: "shared-dma-pool"
    reusable: true
    linux,cma-default: true
  cma_reserved@50000000000:
    label: cma_reserved_50000000000
    start: 0x50000000000
    size: 6G
    compatible: "shared-dma-pool"
    reusable: true
  cma_reserved@60000000000:
    label: cma_reserved_60000000000
    start: 0x60000000000
    size: 4G
    compatible: "shared-dma-pool"
    reusable: true

domains:
  APU_Linux:
    compatible: openamp,domain-v1
    reserved-memory:
      - plm_reserved_memory@00000000
      - tfa_reserved_memory@1000000
      - cma_reserved@800000000
      - cma_reserved@50000000000
      - cma_reserved@60000000000
