reserved-memory:
  ranges: true
  "#size-cells": 2
  "#address-cells": 2

  cma_reserved@4e200000:
    label: cma_reserved_4e200000
    start: 0x4e200000
    size: 750M
    compatible: "shared-dma-pool"
    reusable: true
    linux,cma-default: true

domains:
  APU_Linux:
    compatible: openamp,domain-v1
    reserved-memory:
      - cma_reserved@4e200000
