reserved-memory:
  ranges: true
  "#size-cells": 2
  "#address-cells": 2
  cma_reserved@4B000000:
    label: cma_reserved_4B000000
    start: 0x4B000000
    size: 0x32000000
    compatible: "shared-dma-pool"
    reusable: true
    linux,cma-default: true

domains:
  APU_Linux:
    compatible: openamp,domain-v1
    reserved-memory:
      - cma_reserved@4B000000
