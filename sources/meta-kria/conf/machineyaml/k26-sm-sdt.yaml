args:
    - --hw-description https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0609_1_06092108/external/k26-sm-sdt/k26-sm-sdt_2026.1_0609_1_06092108.tar.gz
    - --machine-name k26-sm-sdt
    - -g full
    - --require-machine include/k26-sm.inc
    - --domain-file ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/zynqmp-multidomain-base.yaml \
                    ${LAYER_PATH_kria-layer}/conf/domainyaml/k26-linux-overlay.yaml
kconfig:
    CONFIG_SUBSYSTEM_BOOTMODE_2: y

machine:
    description: >-
        Machine configuration for the AMD Kria K26 SOM (Zynq UltraScale+
        MPSoC with Mali-400 GPU and H.264/H.265 VCU): Cortex-A53 Linux
        plus Cortex-R5 FreeRTOS/baremetal and MicroBlaze PMU
        sub-machines, built from system device tree.
    pre:
    post:
        require:
            comment: "Default to K26 + KV260"
            op: 'conf/machine/include/kria-qemu-kv.inc'
        QEMU_FLASH_TYPE:
            op: '='
            val: 'qspi'
        QEMU_FLASH_FILE:
            op: '='
            val: 'kria-qspi-${MACHINE}'
        SPI_IMAGE_SIZE:
            comment: 'QSPI flash size (64MB)'
            op: '='
            val: '0x400_0000'
        QEMU_HW_FLASH:append:
            comment: 'QSPI Boots from offset (0x20_0000)'
            op: '='
            val: " -boot multiboot=${@int(int('0x20_0000', 0) / ( 32 * 1024))}"
