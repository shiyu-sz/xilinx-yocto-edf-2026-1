args:
    - --hw-description https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0609_1_06092108/external/k24-smk-kd-sdt/k24-smk-kd-sdt_2026.1_0609_1_06092108.tar.gz
    - --require-machine include/k24-smk.inc
    - --machine-name k24-smk-kd-sdt
    - -g full
    - --domain-file ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/zynqmp-linux-only-base.yaml \
                    ${LAYER_PATH_kria-layer}/conf/domainyaml/k24-linux-overlay.yaml
kconfig:
    CONFIG_SUBSYSTEM_BOOTMODE_2: y

machine:
    description: >-
        Machine configuration for the AMD Kria KD240 Drives Starter Kit
        (K24 SOM, Zynq UltraScale+ MPSoC): Cortex-A53 Linux plus FSBL
        and MicroBlaze PMU sub-machines, built from system device tree.
    pre:
        DTB_FILE_PATH:
            comment: 'Device tree binary for boot image'
            op: '?='
            val: '${RECIPE_SYSROOT}/boot/devicetree/SMK-zynqmp-sck-kd-g-revA.dtb'
    post:
        require:
            comment: "K24 + KD240"
            op: 'conf/machine/include/kria-qemu-kd.inc'
        UBOOT_DT_FILES:
            op: '='
            val: "zynqmp-sck-kd-g-revA.dtso"
        DTB_FILE_NAME:task-install:pn-device-tree:linux:
            op: '='
            val: "${UBOOT_DTFILE_PREFIX}-zynqmp-sck-kd-g-revA.dtb"
        DTB_FILE_NAME:task-deploy:pn-device-tree:linux:
            op: '='
            val: "${UBOOT_DTFILE_PREFIX}-zynqmp-sck-kd-g-revA.dtb"
        PR:append:pn-device-tree:
            op: '='
            val: ".2"
        QEMU_FLASH_TYPE:
            op: '='
            val: 'qspi'
        QEMU_FLASH_FILE:
            op: '='
            val: 'kria-qspi-${MACHINE}'
        SPI_IMAGE_SIZE:
            comment: 'QSPI flash size (64MB)'
            op: '='
            val: '0x400_0000'
        QEMU_HW_FLASH:append:
            comment: 'QSPI Boots from offset (0x20_0000)'
            op: '='
            val: " -boot multiboot=${@int(int('0x20_0000', 0) / ( 32 * 1024))}"
