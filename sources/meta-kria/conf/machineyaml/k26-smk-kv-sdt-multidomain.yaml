inherit:
    ${LAYER_PATH_kria-layer}/conf/machineyaml/k26-smk-kv-sdt.yaml
args:
    - --machine-name k26-smk-kv-sdt-multidomain
args_append:
    - --domain-file ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/zynqmp-multidomain-base.yaml \
                    ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/zynqmp-openamp-overlay.yaml
kconfig:
    CONFIG_YOCTO_BBMC_CORTEXA53_0_BAREMETAL: y
    CONFIG_SUBSYSTEM_BOOTMODE_2: y

machine:
    description: >-
        AMP/multidomain machine for the AMD Kria KV260 Vision AI Starter
        Kit (K26 SOM): Cortex-A53 Linux plus Cortex-A53 baremetal,
        Cortex-R5 FreeRTOS/baremetal, and MicroBlaze PMU sub-machines,
        built from system device tree.
    post:
        require:
            comment: "K26 + KV260"
            op: 'conf/machine/include/kria-qemu-kv.inc'
        UBOOT_DT_FILES:
            op: '='
            val: " zynqmp-sck-kv-g-revA.dtso zynqmp-sck-kv-g-revB.dtso "
        DTB_FILE_NAME:task-install:pn-device-tree:linux:
            op: '='
            val: "${UBOOT_DTFILE_PREFIX}-zynqmp-sck-kv-g-revB.dtb"
        DTB_FILE_NAME:task-deploy:pn-device-tree:linux:
            op: '='
            val: "${UBOOT_DTFILE_PREFIX}-zynqmp-sck-kv-g-revB.dtb"
        PR:append:pn-device-tree:
            op: '='
            val: ".2"
        PACKAGECONFIG:append:pn-xilffs:
            comment: 'Baremetal Image-recovery requires xilffs with ramfs support'
            op: '='
            val: ' ramfs'
        QEMU_FLASH_TYPE:
            op: '='
            val: 'qspi'
        QEMU_FLASH_FILE:
            op: '='
            val: 'kria-qspi-${MACHINE}'
        SPI_IMAGE_SIZE:
            comment: 'QSPI flash size (64MB)'
            op: '='
            val: '0x400_0000'
        QEMU_HW_FLASH:append:
            comment: 'QSPI Boots from offset (0x20_0000)'
            op: '='
            val: " -boot multiboot=${@int(int('0x20_0000', 0) / ( 32 * 1024))}"
