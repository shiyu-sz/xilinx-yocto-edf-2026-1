args:
    - --hw-description https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0609_1_06092108/external/k24c-sm-sdt/k24c-sm-sdt_2026.1_0609_1_06092108.tar.gz
    - --machine-name k24c-sm-sdt
    - -g full
    - --require-machine include/k24-sm.inc
    - --domain-file ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/zynqmp-multidomain-base.yaml \
                    ${LAYER_PATH_kria-layer}/conf/domainyaml/k24-linux-overlay.yaml \
                    ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/zynqmp-openamp-overlay.yaml
kconfig:
    CONFIG_SUBSYSTEM_BOOTMODE_2: y

machine:
    description: >-
        Machine configuration for the AMD Kria K24 SOM (commercial
        grade, Zynq UltraScale+ MPSoC): Cortex-A53 Linux plus Cortex-R5
        FreeRTOS/baremetal and MicroBlaze PMU sub-machines, built from
        system device tree.
    pre:
    post:
        QEMU_FLASH_TYPE:
            op: '='
            val: 'qspi'
        QEMU_FLASH_FILE:
            op: '='
            val: 'kria-qspi-${MACHINE}'
        SPI_IMAGE_SIZE:
            comment: 'QSPI flash size (64MB)'
            op: '='
            val: '0x400_0000'
        QEMU_HW_FLASH:append:
            comment: 'QSPI Boots from offset (0x20_0000)'
            op: '='
            val: " -boot multiboot=${@int(int('0x20_0000', 0) / ( 32 * 1024))}"
