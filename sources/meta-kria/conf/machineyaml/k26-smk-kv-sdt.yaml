args:
    - --hw-description https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0609_1_06092108/external/k26-smk-kv-sdt/k26-smk-kv-sdt_2026.1_0609_1_06092108.tar.gz
    - --machine-name k26-smk-kv-sdt
    - -g full
    - --require-machine include/k26-smk.inc
    - --domain-file ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/zynqmp-linux-only-base.yaml \
                    ${LAYER_PATH_kria-layer}/conf/domainyaml/k26-linux-overlay.yaml
kconfig:
    CONFIG_SUBSYSTEM_BOOTMODE_2: y

machine:
    description: >-
        Machine configuration for the AMD Kria KV260 Vision AI Starter
        Kit (K26 SOM): Cortex-A53 Linux plus FSBL and MicroBlaze PMU
        sub-machines, built from system device tree.
    pre:
        DTB_FILE_PATH:
            comment: 'Device tree binary for boot image'
            op: '?='
            val: '${RECIPE_SYSROOT}/boot/devicetree/SMK-zynqmp-sck-kv-g-revB.dtb'
    post:
        require:
            comment: "K26 + KV260"
            op: 'conf/machine/include/kria-qemu-kv.inc'
        UBOOT_DT_FILES:
            op: '='
            val: " zynqmp-sck-kv-g-revA.dtso zynqmp-sck-kv-g-revB.dtso "
        DTB_FILE_NAME:task-install:pn-device-tree:linux:
            op: '='
            val: "${UBOOT_DTFILE_PREFIX}-zynqmp-sck-kv-g-revB.dtb"
        DTB_FILE_NAME:task-deploy:pn-device-tree:linux:
            op: '='
            val: "${UBOOT_DTFILE_PREFIX}-zynqmp-sck-kv-g-revB.dtb"
        PR:append:pn-device-tree:
            op: '='
            val: ".2"
        QEMU_FLASH_TYPE:
            op: '='
            val: 'qspi'
        QEMU_FLASH_FILE:
            op: '='
            val: 'kria-qspi-${MACHINE}'
        SPI_IMAGE_SIZE:
            comment: 'QSPI flash size (64MB)'
            op: '='
            val: '0x400_0000'
        QEMU_HW_FLASH:append:
            comment: 'QSPI Boots from offset (0x20_0000)'
            op: '='
            val: " -boot multiboot=${@int(int('0x20_0000', 0) / ( 32 * 1024))}"
