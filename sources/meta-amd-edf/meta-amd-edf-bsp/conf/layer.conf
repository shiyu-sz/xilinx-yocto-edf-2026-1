# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += " \
    ${LAYERDIR}/recipes-*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*.bbappend \
    "

BBFILE_COLLECTIONS += "amd-edf-bsp"
BBFILE_PRIORITY_amd-edf-bsp = "5"

LAYERSUMMARY_amd-edf-bsp = "AMD Embedded Development Framework BSP \
common machines"
LAYERDESCRIPTION_amd-edf-bsp = "BSP layer for the AMD Embedded \
Development Framework reference distro: shared common-machine .conf \
files (per Cortex-Ax / RISC-V tune) used to build root filesystems \
across multiple AMD boards."
BBFILE_PATTERN_amd-edf-bsp = "^${LAYERDIR}/"
BBFILE_PATTERN_IGNORE_EMPTY_amd-edf-bsp = "1"

LAYERDEPENDS_amd-edf-bsp = "\
    amd-edf \
    "

LAYERSERIES_COMPAT_amd-edf-bsp = "scarthgap"
