#@TYPE: Machine
#@NAME: amd-cortexa9thf-neon-common
#@DESCRIPTION: Common AMD machine used to build a shared Cortex-A9 root filesystem (Thumb-2, hardfloat, NEON) for Zynq-7000 boards. Not bootable on its own.

#### Preamble
MACHINEOVERRIDES =. "${@['', 'amd-cortexa9thf-neon-common:']['amd-cortexa9thf-neon-common' != '${MACHINE}']}"
#### Regular settings follow

DEFAULTTUNE = "cortexa9thf-neon"

# These devices are all Zynq based
require conf/machine/zynq-generic.conf

# We do not want the boot.bin, bootloader and other pre-Linux things to build,
# these should come from the machine
HW_BOOT_MODE = ""
SOC_ON_DISK_BOOT_BIN = ""
EXTRA_IMAGEDEPENDS = "qemu-devicetrees-native"
IMAGE_EFI_BOOT_FILES = ""

# We do want to deploy the boot.scr
IMAGE_BOOT_FILES = "boot.scr"

# Clear serial consoles, use the kernel console=
SERIAL_CONSOLES = ""

# Clear the machine specifc settings
QB_CMDLINE_IP_SLIRP = ""
QB_CMDLINE_IP_TAP = ""
QB_DEFAULT_KERNEL = ""
QB_DTB = ""
QB_MACHINE = ""
QB_MEM = ""
QB_NETWORK_DEVICE = ""
QB_NO_PNI = ""
QB_OPT_APPEND = ""
QB_ROOTFS_OPT = ""
QB_SERIAL_OPT = ""

MACHINE_FEATURES += "fpga-overlay wifi"

#### No additional settings should be after the Postamble
#### Postamble
PACKAGE_EXTRA_ARCHS:append = "${@['', ' amd_cortexa9thf_neon_common']['amd-cortexa9thf-neon-common' != "${MACHINE}"]}"
