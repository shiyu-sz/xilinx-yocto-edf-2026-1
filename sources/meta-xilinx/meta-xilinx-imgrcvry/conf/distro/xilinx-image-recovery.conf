# AMD Xilinx Image Recovery distribution.
# Builds the small recovery rootfs / image used by the field-update
# and golden-image flows on supported AMD Xilinx boards.  Not a
# general-purpose Linux distribution.

require conf/distro/amd-edf-small.conf

DISTRO = "xilinx-image-recovery"
DISTRO_NAME = "AMD Xilinx Image Recovery distribution"

DISTRO_VERSION = "1.1"

DISTROOVERRIDES .= ":imgrcvry"

SDK_VENDOR = "-imgrcvrysdk"

MAINTAINER = "AMD AECG <meta-xilinx@yoctoproject.org>"

TARGET_VENDOR = "-imgrcvry"

PREFERRED_PROVIDER_virtual/bootloader = "u-boot-xlnx-imgrcvry"

MACHINE_FEATURES:remove = "optee"
