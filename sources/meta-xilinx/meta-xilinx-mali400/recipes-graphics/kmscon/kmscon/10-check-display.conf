[Unit]
ConditionPathIsDirectory=/sys/class/drm/card0

[Service]
# Start kmsconvt only if at least one display connector is not
# disconnected. grep -L lists files that do NOT match the pattern,
# so connectors reporting "connected" or "unknown" pass through.
# The trailing grep -q succeeds if any such file exists.
ExecStartPre=/bin/sh -c 'grep -rL ^disconnected /sys/class/drm/card0-*/status | grep -q .'
