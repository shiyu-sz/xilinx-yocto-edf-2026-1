#@TYPE: Machine
#@NAME: zynqmp-dr-generic
#@DESCRIPTION: Generic machine configuration for the AMD Zynq UltraScale+ RFSoC (DR) variant (MPSoC plus integrated RF data converters). Obsolete use zynqmp-generic instead.

#### Preamble
MACHINEOVERRIDES =. "${@['', 'zynqmp-dr-generic:']['zynqmp-dr-generic' != '${MACHINE}']}"
#### Regular settings follow

require conf/machine/zynqmp-generic.conf

MACHINE_FEATURES += "rfsoc"

#### No additional settings should be after the Postamble
#### Postamble
PACKAGE_EXTRA_ARCHS:append = "${@['', ' zynqmp_dr_generic']['zynqmp-dr-generic' != "${MACHINE}"]}"

