#@TYPE: Machine
#@NAME: zynqmp-ev-generic
#@DESCRIPTION: Generic machine configuration for the quad-core (EV) variant of the AMD Zynq UltraScale+ MPSoC family (with Mali-400 GPU and H.264/H.265 Video Codec Unit). Obsolete use zynqmp-generic instead.

#### Preamble
MACHINEOVERRIDES =. "${@['', 'zynqmp-ev-generic:']['zynqmp-ev-generic' != '${MACHINE}']}"
#### Regular settings follow

require conf/machine/zynqmp-generic.conf

MACHINE_FEATURES += "mali400 vcu"

#### No additional settings should be after the Postamble
#### Postamble
PACKAGE_EXTRA_ARCHS:append = "${@['', ' zynqmp_ev_generic']['zynqmp-ev-generic' != "${MACHINE}"]}"

