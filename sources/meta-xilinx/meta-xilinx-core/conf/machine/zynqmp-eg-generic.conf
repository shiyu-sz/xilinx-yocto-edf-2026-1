#@TYPE: Machine
#@NAME: zynqmp-eg-generic
#@DESCRIPTION: Generic machine configuration for the quad-core (EG) variant of the AMD Zynq UltraScale+ MPSoC family (with Mali-400 GPU). Obsolete use zynqmp-generic instead.

#### Preamble
MACHINEOVERRIDES =. "${@['', 'zynqmp-eg-generic:']['zynqmp-eg-generic' != '${MACHINE}']}"
#### Regular settings follow

require conf/machine/zynqmp-generic.conf

MACHINE_FEATURES += "mali400"

#### No additional settings should be after the Postamble
#### Postamble
PACKAGE_EXTRA_ARCHS:append = "${@['', ' zynqmp_eg_generic']['zynqmp-eg-generic' != "${MACHINE}"]}"

