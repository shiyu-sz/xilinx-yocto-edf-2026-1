# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have a packages directory, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "xilinx"
BBFILE_PATTERN_xilinx = "^${LAYERDIR}/"
BBFILE_PRIORITY_xilinx = "5"

LAYERSUMMARY_xilinx = "AMD Xilinx core layer (recipes, classes, \
kernel, U-Boot, ATF)"
LAYERDESCRIPTION_xilinx = "Core meta-xilinx layer: recipe, class, and \
conf scaffolding shared across all AMD Xilinx boards, including \
kernel, U-Boot, ATF/TF-A, OP-TEE, gen-machine-conf integration, and \
the dynamic-layer glue."

BBFILES_DYNAMIC += " \
meta-mingw:${LAYERDIR}/dynamic-layers/meta-mingw/recipes-*/*/*.bb \
meta-mingw:${LAYERDIR}/dynamic-layers/meta-mingw/recipes-*/*/*.bbappend \
openembedded-layer:${LAYERDIR}/dynamic-layers/openembedded-layer/recipes-*/*/*.bb \
openembedded-layer:${LAYERDIR}/dynamic-layers/openembedded-layer/recipes-*/*/*.bbappend \
meta-python:${LAYERDIR}/dynamic-layers/meta-python/recipes-*/*/*.bb \
meta-python:${LAYERDIR}/dynamic-layers/meta-python/recipes-*/*/*.bbappend \
multimedia-layer:${LAYERDIR}/dynamic-layers/multimedia-layer/recipes-*/*/*.bb \
multimedia-layer:${LAYERDIR}/dynamic-layers/multimedia-layer/recipes-*/*/*.bbappend \
networking-layer:${LAYERDIR}/dynamic-layers/networking-layer/recipes-*/*/*.bb \
networking-layer:${LAYERDIR}/dynamic-layers/networking-layer/recipes-*/*/*.bbappend \
openamp-layer:${LAYERDIR}/dynamic-layers/openamp-layer/recipes-*/*/*.bb \
openamp-layer:${LAYERDIR}/dynamic-layers/openamp-layer/recipes-*/*/*.bbappend \
virtualization-layer:${LAYERDIR}/dynamic-layers/virtualization-layer/recipes-*/*/*.bb \
virtualization-layer:${LAYERDIR}/dynamic-layers/virtualization-layer/recipes-*/*/*.bbappend \
xilinx-tools:${LAYERDIR}/dynamic-layers/meta-xilinx-tools/recipes-*/*/*.bb \
xilinx-tools:${LAYERDIR}/dynamic-layers/meta-xilinx-tools/recipes-*/*/*.bbappend \
core:${LAYERDIR}/dynamic-layers/poky/recipes-*/*/*.bb \
core:${LAYERDIR}/dynamic-layers/poky/recipes-*/*/*.bbappend \
"

LAYERDEPENDS_xilinx = "core meta-arm"
LAYERRECOMMENDS_xilinx = "openembedded-layer networking-layer"

LAYERPATH_xilinx = "${LAYERDIR}"

LAYERSERIES_COMPAT_xilinx = "scarthgap"

SIGGEN_EXCLUDE_SAFE_RECIPE_DEPS += " \
  *->xrt \
  *->zocl \
  *->cairo \
  *->libepoxy \
  *->gstreamer1.0-plugins-base \
  *->gtk+ \
  *->gtk+3 \
  *->libglu \
  *->libsdl \
  *->libsdl2 \
  *->qemu \
  *->xserver-xorg \
"

XILINX_RELEASE_VERSION ??= "v2026.1"

BUILDCFG_VARS:append = " XILINX_RELEASE_VERSION"

XILINX_ATF_VERSION[v2023.1] = "2.8-xilinx-v2023.1%"
XILINX_ATF_VERSION[v2023.2] = "2.8-xilinx-v2023.2%"
XILINX_ATF_VERSION[v2024.1] = "2.10-xilinx-v2024.1%"
XILINX_ATF_VERSION[v2024.2] = "2.10-xilinx-v2024.2%"
XILINX_ATF_VERSION[v2025.1] = "2.12-xilinx-v2025.1%"
XILINX_ATF_VERSION[v2025.2] = "2.12-xilinx-v2025.2%"
XILINX_ATF_VERSION[v2026.1] = "2.14-xilinx-v2026.1%"
PREFERRED_VERSION_virtual/arm-trusted-firmware ?= "${@d.getVarFlag('XILINX_ATF_VERSION', d.getVar('XILINX_RELEASE_VERSION')) or 'undefined'}"

# The name of the software has changed to match upstream ARM
XILINX_ATF_PROVIDERS[v2024.2] = "trusted-firmware-a"
XILINX_ATF_PROVIDERS[v2025.1] = "trusted-firmware-a"
XILINX_ATF_PROVIDERS[v2025.2] = "trusted-firmware-a"
