# Linuxptp for scarhtgap is currently at 4.1, but we want to be able to update
# to 4.4 backport from meta-oe master to test 6.18 kernel drivers using 4.4 new
# features, so we set the version per release and default to 4.1 for older releases.
LINUX_PTP_VERSION[v2024.2] = "4.1"
LINUX_PTP_VERSION[v2025.1] = "4.1"
LINUX_PTP_VERSION[v2025.2] = "4.1"
LINUX_PTP_VERSION[v2026.1] = "4.4"
PREFERRED_VERSION_linuxptp ?= "${@d.getVarFlag('LINUX_PTP_VERSION', d.getVar('XILINX_RELEASE_VERSION')) or 'undefined'}"

# Define the pmu-rom filename, needed for coordination between native and machine recipes
PMU_ROM ?= "pmu-rom.elf"

# Add support to eSDK for gen-machine-conf if it exists
PLNX_SCRIPTS_PATH = "${LAYERDIR}/gen-machine-conf/gen-machine-scripts"
BB_HASHEXCLUDE_COMMON:append = " PLNX_SCRIPTS_PATH"

IMAGE_CLASSES += "gen-machine-conf"

# Add our local, forked version of wic to the bitbake's path
INHERIT += "xilinx-wic"
