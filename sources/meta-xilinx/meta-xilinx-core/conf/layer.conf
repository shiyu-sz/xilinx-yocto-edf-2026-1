PREFERRED_VERSION_optee-test ?= "${@d.getVarFlag('XILINX_OPTEE_TEST', d.getVar('XILINX_RELEASE_VERSION')) or 'undefined'}"

# Community meta-arm does not have 2.14 version
PREFERRED_VERSION_fiptool-native = "${@"2.14%" if (d.getVar('PREFERRED_VERSION_trusted-firmware-a') or d.getVar('PREFERRED_VERSION_virtual/arm-trusted-firmware') or d.getVarFlag('XILINX_ATF_VERSION', d.getVar('XILINX_RELEASE_VERSION')) or '').startswith("2.14") else ''}"
PREFERRED_VERSION_tf-a-tests = "${@"2.14%" if (d.getVar('PREFERRED_VERSION_trusted-firmware-a') or d.getVar('PREFERRED_VERSION_virtual/arm-trusted-firmware') or d.getVarFlag('XILINX_ATF_VERSION', d.getVar('XILINX_RELEASE_VERSION')) or '').startswith("2.14") else ''}"

XILINX_UBOOT_VERSION[v2023.1] = "1:2023.01-xilinx-v2023.1%"
