# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have packages directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "xilinx-virtualization"
BBFILE_PATTERN_xilinx-virtualization = "^${LAYERDIR}/"
BBFILE_PRIORITY_xilinx-virtualization = "5"

LAYERSUMMARY_xilinx-virtualization = "AMD Xilinx Xen / KVM \
virtualization recipes"
LAYERDESCRIPTION_xilinx-virtualization = "Virtualization layer adding \
Xen and KVM enablement, guest machine helpers, and image recipes for \
AMD Xilinx hardware."

LAYER_PATH_xilinx-virtualization = "${LAYERDIR}"

LAYERDEPENDS_xilinx-virtualization = "\
    xilinx \
    virtualization-layer \
    security \
    tpm-layer \
    "

LAYERSERIES_COMPAT_xilinx-virtualization = "scarthgap"

# Xilinx Xen preferred versions per release
XILINX_XEN_VERSION[v2024.1] = "4.18+stable-xilinx+git%"
XILINX_XEN_VERSION[v2024.2] = "4.18+stable-xilinx+git%"
XILINX_XEN_VERSION[v2025.1] = "4.20.0+stable-xilinx+git%"
XILINX_XEN_VERSION[v2025.2] = "4.20.0+stable-xilinx+git%"
XILINX_XEN_VERSION[v2026.1] = "4.21.0+stable-xilinx+git%"

# Xilinx Xen Tools preferred versions per release
XILINX_XEN_TOOLS_VERSION[v2024.1] = "4.18+stable-xilinx+git%"
XILINX_XEN_TOOLS_VERSION[v2024.2] = "4.18+stable-xilinx+git%"
XILINX_XEN_TOOLS_VERSION[v2025.1] = "4.20.0+stable-xilinx+git%"
XILINX_XEN_TOOLS_VERSION[v2025.2] = "4.20.0+stable-xilinx+git%"
XILINX_XEN_TOOLS_VERSION[v2026.1] = "4.21+stable-xilinx+git%"

PREFERRED_VERSION_xen ?= "${@d.getVarFlag('XILINX_XEN_VERSION', d.getVar('XILINX_RELEASE_VERSION')) or '4.21+stable-xilinx+git%'}"
PREFERRED_VERSION_xen-tools ?= "${@d.getVarFlag('XILINX_XEN_TOOLS_VERSION', d.getVar('XILINX_RELEASE_VERSION')) or '4.21+stable-xilinx+git%'}"

BBMASK += "dynamic-layers/xilinx/recipes-bsp/device-tree/device-tree.bbappend"
