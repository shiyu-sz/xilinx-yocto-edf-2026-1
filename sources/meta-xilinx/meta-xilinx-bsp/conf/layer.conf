# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have a packages directory, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "xilinx-bsp"
BBFILE_PATTERN_xilinx-bsp = "^${LAYERDIR}/"
BBFILE_PRIORITY_xilinx-bsp = "5"

LAYERSUMMARY_xilinx-bsp = "AMD Xilinx core BSP (Versal/Zynq/MicroBlaze \
evaluation boards)"
LAYERDESCRIPTION_xilinx-bsp = "BSP layer providing the supported AMD \
Xilinx evaluation board machine configurations (Versal \
VCK/VEK/VMK/VPK/VRK, Versal Gen 2, Zynq UltraScale+, Zynq-7000, \
MicroBlaze)."
BBFILE_PATTERN_IGNORE_EMPTY_xilinx-bsp = "1"

LAYERDEPENDS_xilinx-bsp = "xilinx"

LAYERSERIES_COMPAT_xilinx-bsp = "scarthgap"
