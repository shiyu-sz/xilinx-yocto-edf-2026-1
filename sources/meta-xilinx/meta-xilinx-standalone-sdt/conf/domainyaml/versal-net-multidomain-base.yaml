domains:
  APU_Linux:
    compatible: openamp,domain-v1
    cpus:
      - cluster: cpus_a78
        cpumask: 0xff
        mode:
          secure: false
          el: 0x3
    os,type: linux

  RPU_Zephyr:
    compatible: openamp,domain-v1
    cpus:
      - cluster: cpus_r52_0
        # cluster_cpu is required for RPU domains. Lopper uses it to auto-generate
        # cpu_config_str, rpu_pd_val, core_num and cluster_cpu properties in the
        # output DTS. Without it, remoteproc nodes will not be generated.
        cluster_cpu: cortexr52_0
        cpumask: 0x1
        mode:
          secure: true
          el: 0x3
    os,type: zephyr

  RPU_1_BM:
    compatible: openamp,domain-v1
    cpus:
      - cluster: cpus_r52_1
        # cluster_cpu is required for RPU domains. Lopper uses it to auto-generate
        # cpu_config_str, rpu_pd_val, core_num and cluster_cpu properties in the
        # output DTS. Without it, remoteproc nodes will not be generated.
        cluster_cpu: cortexr52_1
        cpumask: 0x2
        mode:
          secure: true
          el: 0x3
    os,type: baremetal
