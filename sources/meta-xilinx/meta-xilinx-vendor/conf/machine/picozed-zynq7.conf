#@TYPE: Machine
#@NAME: picozed-zynq7
#@DESCRIPTION: Machine configuration for the Avnet PicoZed system-on-module (Xilinx Zynq-7000, dual-core Cortex-A9). See https://www.avnet.com/wps/portal/us/products/avnet-boards/avnet-board-families/picozed/.
#
# Note: This machine configuration is intended as a generic config for
# the picozed SOM. It also covers the multiple SKUs for the picoZed
# including 7010, 7020, 7015 and 7030.

require conf/machine/zynq-generic.conf

SPL_BINARY ?= "spl/boot.bin"
UBOOT_ELF = "u-boot"

EXTRA_IMAGEDEPENDS += " \
		u-boot-xlnx-uenv \
		"

IMAGE_BOOT_FILES += " \
		boot.bin \
		uEnv.txt \
		"

