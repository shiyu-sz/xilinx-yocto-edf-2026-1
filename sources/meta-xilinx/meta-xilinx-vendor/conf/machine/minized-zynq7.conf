#@TYPE: Machine
#@NAME: minized-zynq7
#@DESCRIPTION: Machine configuration for the Avnet MiniZed development board (Xilinx Zynq-7000 single-core Cortex-A9). See https://www.avnet.com/wps/portal/us/products/avnet-boards/avnet-board-families/minized/.

require conf/machine/zynq-generic.conf

MACHINE_FEATURES = "ext2 vfat usbhost wifi bluetooth"

UBOOT_MACHINE ?= "zynq_minized_config"

EXTRA_IMAGEDEPENDS += " \
		u-boot-xlnx-uenv \
		"

SERIAL_CONSOLES ?= "115200;ttyPS0"

MACHINE_ESSENTIAL_EXTRA_RDEPENDS += "device-tree"

MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS += "linux-firmware-bcm43430"

IMAGE_BOOT_FILES += " \
		uEnv.txt \
		"
