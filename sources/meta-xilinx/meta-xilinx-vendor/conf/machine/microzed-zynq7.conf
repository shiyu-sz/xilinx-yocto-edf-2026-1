#@TYPE: Machine
#@NAME: microzed-zynq7
#@DESCRIPTION: Machine configuration for the Avnet MicroZed system-on-module (Xilinx Zynq-7000, dual-core Cortex-A9). See https://www.avnet.com/wps/portal/us/products/avnet-boards/avnet-board-families/microzed/.

require conf/machine/zynq-generic.conf

SPL_BINARY ?= "spl/boot.bin"
UBOOT_ELF = "u-boot"

EXTRA_IMAGEDEPENDS += " \
		u-boot-xlnx-uenv \
		"

KERNEL_DEVICETREE = "zynq-microzed.dtb"

IMAGE_BOOT_FILES += " \
		boot.bin \
		uEnv.txt \
		"

