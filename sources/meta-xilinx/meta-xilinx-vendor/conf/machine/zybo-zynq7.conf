#@TYPE: Machine
#@NAME: zybo-zynq7
#@DESCRIPTION: Machine configuration for the Digilent Zybo board (Xilinx Zynq-7000 XC7Z010, dual-core Cortex-A9). See https://digilent.com/reference/programmable-logic/zybo/start.
#
# For details on the ZYBO board:
#     https://www.digilentinc.com/Products/Detail.cfm?Prod=ZYBO
#

require conf/machine/zynq-generic.conf

SPL_BINARY ?= "spl/boot.bin"
UBOOT_ELF = "u-boot"

EXTRA_IMAGEDEPENDS += " \
		u-boot-xlnx-uenv \
		"

KERNEL_DEVICETREE = "zynq-zybo.dtb"

IMAGE_BOOT_FILES += " \
		boot.bin \
		uEnv.txt \
		"

