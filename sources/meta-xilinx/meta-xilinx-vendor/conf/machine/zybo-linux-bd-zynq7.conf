#@TYPE: Machine
#@NAME: zybo-linux-bd-zynq7
#@DESCRIPTION: Machine configuration for the Digilent Zybo board (Xilinx Zynq-7000, dual-core Cortex-A9) using the upstream zybo-linux-bd Linux/U-Boot board-design integration project.
#
# generated base on ZYBO linux-bd project
#

require conf/machine/zynq-generic.conf

MACHINE_FEATURES += "keyboard screen alsa sdio"

SPL_BINARY ?= "spl/boot.bin"
FORCE_PLATFORM_INIT = "1"
UBOOT_ELF = "u-boot"

IMAGE_BOOT_FILES += " \
		boot.bin \
		bitstream \
		uEnv.txt \
		"

KERNEL_FEATURES += " \
		features/xilinx/v4l2/v4l2.scc \
		"
