# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have a packages directory, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "xilinx-demos"
BBFILE_PATTERN_xilinx-demos = "^${LAYERDIR}/"
BBFILE_PRIORITY_xilinx-demos = "13"

LAYERSUMMARY_xilinx-demos = "AMD Xilinx demo and reference application \
recipes"
LAYERDESCRIPTION_xilinx-demos = "Recipe layer with demo and reference \
applications used to showcase AMD Xilinx hardware features in the \
meta-xilinx reference images."

LAYERDEPENDS_xilinx-demos = "core"
LAYERRECOMMENDS_xilinx-demos = "\
    openembedded-layer \
    jupyter-layer \
    openamp-layer \
    ros-common-layer \
    ros2-layer \
    ros2-jazzy-layer \
    qt5-layer \
    amd-adaptive-socs-bsp \
    "

LAYERSERIES_COMPAT_xilinx-demos = "scarthgap"

# Define dynamic layers
BBFILES_DYNAMIC += " \
    jupyter-layer:${LAYERDIR}/dynamic-layers/meta-jupyter/recipes-*/*/*.bb \
    jupyter-layer:${LAYERDIR}/dynamic-layers/meta-jupyter/recipes-*/*/*.bbappend \
    openamp-layer:${LAYERDIR}/dynamic-layers/meta-openamp/recipes-*/*/*.bb \
    openamp-layer:${LAYERDIR}/dynamic-layers/meta-openamp/recipes-*/*/*.bbappend \
    ros-common-layer:${LAYERDIR}/dynamic-layers/meta-ros/meta-ros-common/recipes-*/*/*.bb \
    ros-common-layer:${LAYERDIR}/dynamic-layers/meta-ros/meta-ros-common/recipes-*/*/*.bbappend \
    ros2-jazzy-layer:${LAYERDIR}/dynamic-layers/meta-ros/meta-ros2-jazzy/recipes-*/*/*.bb \
    ros2-jazzy-layer:${LAYERDIR}/dynamic-layers/meta-ros/meta-ros2-jazzy/recipes-*/*/*.bbappend \
    qt5-layer:${LAYERDIR}/dynamic-layers/meta-qt5/recipes-*/*/*.bb \
    qt5-layer:${LAYERDIR}/dynamic-layers/meta-qt5/recipes-*/*/*.bbappend \
    "
