args:
    - --hw-description https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0609_1_06092108/external/emb-plus-ve2302-xrt/emb-plus-ve2302-xrt_2026.1_0605_1_06092108.tar.gz
    - --machine-name emb-plus-ve2302-xrt
    - --domain-file ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/versal-linux-only-base.yaml \
                    ${LAYER_PATH_embedded-plus-layer}/conf/domainyaml/emb-plus-ve2302-xrt-linux-overlay.yaml

kconfig:
    CONFIG_YOCTO_BBMC_LINUX_DTSI: \
        ${LAYER_PATH_embedded-plus-layer}/recipes-bsp/device-tree/files/emb-plus-platform.dtsi
    CONFIG_SUBSYSTEM_BOOTMODE_5: y

machine:
    description: >-
        Machine configuration for the AMD Embedded+ VE2302 board (Versal
        AI Edge VE2302) running the XRT (Xilinx Runtime) stack:
        Cortex-A72 Linux plus MicroBlaze PMC/PSM firmware sub-machines.
    post:
        UBOOT_BOOT_SCRIPT:emb-plus-ve2302-xrt:${DISTRO}:
            comment: 'Use the specific boot script'
            op: '='
            val: 'u-boot-xlnx-scr'
        SPI_IMAGE_SIZE:
            comment: 'OSPI flash size (128MB)'
            op: '='
            val: '0x0800_0000'
