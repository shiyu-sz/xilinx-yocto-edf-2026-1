args:
    - --hw-description https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0609_1_06092108/external/emb-plus-ve2302-amr/emb-plus-ve2302-amr_2026.1_0609_1_06092108.tar.gz
    - --machine-name emb-plus-ve2302-amr
    - -g full
    - -O emb-plus-amr
    - --domain-file ${LAYER_PATH_xilinx-standalone-sdt}/conf/domainyaml/versal-linux-only-base.yaml \
                    ${LAYER_PATH_embedded-plus-layer}/conf/domainyaml/emb-plus-ve2302-amr-linux-overlay.yaml

kconfig:
    CONFIG_YOCTO_BBMC_CORTEXR5_0_FREERTOS: y
    CONFIG_YOCTO_BBMC_CORTEXR5_1_BAREMETAL: y
    CONFIG_SUBSYSTEM_SERIAL_SERIAL1_SELECT: y
    CONFIG_SUBSYSTEM_BOOTMODE_5: y
    CONFIG_YOCTO_BBMC_LINUX_DTSI: \
      ${LAYER_PATH_embedded-plus-layer}/recipes-bsp/device-tree/files/emb-plus-platform-amr.dtsi

machine:
    description: >-
        AMP/multidomain machine for the AMD Embedded+ VE2302 board
        (Versal AI Edge VE2302) running the AMR stack: Cortex-A72 Linux
        plus Cortex-R5 FreeRTOS/baremetal and MicroBlaze PMC/PSM
        sub-machines.
    pre:
        TFA_CONSOLE:
            op: '?='
            val: 'pl011_1'
        UBOOT_ENTRYPOINT:
            op: '?='
            val: '0x8200000'
        UBOOT_LOADADDRESS:
            op: '?='
            val: '0x8200000'
    post:
        SPI_IMAGE_SIZE:
            comment: 'OSPI flash size (128MB)'
            op: '='
            val: '0x0800_0000'
        UBOOT_BOOT_SCRIPT:emb-plus-ve2302-amr:${DISTRO}:
            comment: 'Use the specific boot script'
            op: '='
            val: 'u-boot-xlnx-scr'
