#@TYPE: Machine
#@NAME: alveo-v80-amr
#@DESCRIPTION: AMP/multidomain machine for the AMD Alveo V80 Compute Accelerator Card (Versal Premium) running the AMR (AVED Management Runtime) stack: Cortex-A72 Linux plus Cortex-R5 FreeRTOS and MicroBlaze PMC/PSM sub-machines.

BBMULTICONFIG += "alveo-v80-amr-microblaze-pmc alveo-v80-amr-microblaze-psm alveo-v80-amr-cortexr5-0-freertos"
MACHINEOVERRIDES .= ":alveo-amr"

#### Preamble
MACHINEOVERRIDES =. "${@['', 'alveo-v80-amr:']['alveo-v80-amr' !='${MACHINE}']}"
#### Regular settings follow
TUNEFILE[microblaze-pmc] = "conf/machine/include/alveo-v80-amr/microblaze.inc"
TUNEFILE[microblaze-psm] = "conf/machine/include/alveo-v80-amr/microblaze.inc"

# Platform Loader and Manager
PLM_DEPENDS = ""
PLM_MCDEPENDS = "mc::alveo-v80-amr-microblaze-pmc:plm-firmware:do_deploy"
PLM_DEPLOY_DIR = "${TMPDIR}-alveo-v80-amr-microblaze-pmc/deploy/images/${MACHINE}"

# PSM Firmware
PSM_DEPENDS = ""
PSM_MCDEPENDS = "mc::alveo-v80-amr-microblaze-psm:psm-firmware:do_deploy"
PSM_FIRMWARE_DEPLOY_DIR = "${TMPDIR}-alveo-v80-amr-microblaze-psm/deploy/images/${MACHINE}"

# Set the default (linux) domain device tree
CONFIG_DTFILE_DIR := "${@bb.utils.which(d.getVar('BBPATH'), 'conf/dts/alveo-v80-amr')}"
CONFIG_DTFILE ?= "${CONFIG_DTFILE_DIR}/cortexa72-linux.dts"
CONFIG_DTFILE[vardepsexclude] += "CONFIG_DTFILE_DIR"

DTB_FILE_PATH ?= "${RECIPE_SYSROOT}/boot/devicetree/${@os.path.basename(d.getVar('CONFIG_DTFILE').replace('.dts', '.dtb'))}"

# Serial Console Settings
SERIAL_CONSOLES ?= "115200;ttyAMA1"

# Yocto arm-trusted-firmware(TF-A) variables
TFA_CONSOLE ?= "pl011_1"
TFA_BL33_LOAD ?= "0x8000000"

# Yocto u-boot-xlnx variables

# Set DDR Base address for u-boot-xlnx-scr variables
DDR_BASEADDR ?= "0x0"
SKIP_APPEND_BASEADDR ?= "0"

# Yocto KERNEL Variables
UBOOT_ENTRYPOINT ?= "0x200000"
UBOOT_LOADADDRESS ?= "0x200000"

# Yocto MACHINE_FEATURES Variable
MACHINE_FEATURES += "fpga-overlay efi"

# Required generic machine inclusion
require conf/machine/versal-generic.conf

# QEMU Memory Configuration
QB_MEM = "-machine dynamic-mem=on -device amd-ddr-memory,address=0x4000000000,size=0x800000000 -device amd-ddr-memory,address=0x20100000000,size=0x800000 -device amd-ddr-memory,address=0x50080000000,size=0x80000000 -device amd-ddr-memory,address=0x60000000000,size=0x800000000"

# OSPI flash size (256MB)
SPI_IMAGE_SIZE = "0x1000_0000"
# Use the specific boot script
UBOOT_BOOT_SCRIPT:alveo-v80-amr:${DISTRO} = "u-boot-xlnx-scr"

# This is an 'SDT' based BSP
XILINX_WITH_ESW = "sdt"

# Original SDT artifacts URL
SDT_URI = "https://edf.amd.com/sswreleases/rel-v2026.1/sdt/2026.1/2026.1_0609_1_06092108/external/alveo-v80-amr/alveo-v80-amr_2026.1_0609_1_06092108.tar.gz"
SDT_URI[sha256sum] = "9b58d3bd95cb8585b19b2011f77cd8e32d81e44faf9d058ddff17d6d158c0c7a"
SDT_URI[S] = "${WORKDIR}/alveo-v80-amr_2026.1_0609_1_06092108"

# Set the system device trees
SYSTEM_DTFILE_DEPENDS = "sdt-artifacts"
SYSTEM_DTFILE_DIR = "${RECIPE_SYSROOT}${datadir}/sdt/${MACHINE}"
SYSTEM_DTFILE = "${SYSTEM_DTFILE_DIR}/system-top.dts"

# Load the dynamic machine features
include conf/machine/include/alveo-v80-amr/${BB_CURRENT_MC}-features.conf
LIBXIL_CONFIG = "conf/machine/include/alveo-v80-amr/${BB_CURRENT_MC}-libxil.conf"

# PDI variables
PDI_PATH_DEPENDS = "sdt-artifacts"
PDI_PATH_DIR = "${RECIPE_SYSROOT}${datadir}/sdt/${MACHINE}"
PDI_PATH = "${PDI_PATH_DIR}/v80_base_boot.pdi"

# Primary Bootmode value
DEFAULT_HW_BOOT_MODE = "8"

# Update bootbin to use proper device tree
BIF_PARTITION_IMAGE[device-tree] = "${DTB_FILE_PATH}"

# Remap boot files to ensure the right device tree is listed first
IMAGE_BOOT_FILES =+ "devicetree/${@os.path.basename(d.getVar('CONFIG_DTFILE').replace('.dts', '.dtb'))}"

#### No additional settings should be after the Postamble
#### Postamble
PACKAGE_EXTRA_ARCHS:append = "${@['', ' alveo_v80_amr']['alveo-v80-amr' != '${MACHINE}']}"
